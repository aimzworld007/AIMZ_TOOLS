<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIMZ Tools Link App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f5f7fb;
      --bg-2: #fff4e8;
      --surface: #ffffff;
      --surface-2: #f9fbff;
      --text-main: #162235;
      --text-subtle: #5e6b7d;
      --brand: #0e7f84;
      --brand-2: #25a6a0;
      --accent: #f59f00;
      --border: #dfe8f4;
      --shadow: 0 14px 35px rgba(17, 44, 69, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --motion: 260ms cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(1100px 450px at 10% -10%, #d7f5ef 10%, transparent 60%),
        radial-gradient(900px 500px at 95% 0%, #ffe3bf 8%, transparent 58%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(245, 251, 255, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 26px 24px;
      margin-bottom: 24px;
      animation: riseIn 0.7s var(--motion);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37, 166, 160, 0.3), rgba(37, 166, 160, 0.03));
      right: -35px;
      top: -55px;
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(14, 127, 132, 0.09);
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      font-family: "Sora", sans-serif;
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      margin: 14px 0 10px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--text-subtle);
      font-size: 1rem;
      max-width: 760px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 18px;
    }

    .tool-card {
      background: linear-gradient(165deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: 0 10px 24px rgba(20, 35, 55, 0.08);
      transition: transform var(--motion), box-shadow var(--motion), border-color var(--motion);
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.55s var(--motion) forwards;
    }

    .tool-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 34px rgba(20, 35, 55, 0.13);
      border-color: #c6d8ee;
    }

    .tool-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tool-icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: linear-gradient(145deg, #0e7f84, #25a6a0);
      color: #ffffff;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 18px rgba(14, 127, 132, 0.32);
      flex-shrink: 0;
    }

    .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .tool-title {
      margin: 0;
      font-size: 1.06rem;
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }

    .tool-desc {
      margin: 0;
      color: var(--text-subtle);
      font-size: 0.95rem;
      line-height: 1.55;
      min-height: 68px;
    }

    .tool-link-box {
      margin-top: auto;
      border-radius: 12px;
      background: #ecf5ff;
      border: 1px solid #d0e5fb;
      padding: 10px 12px;
      font-size: 0.83rem;
      color: #26598f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-action {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(145deg, var(--brand), var(--brand-2));
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.92rem;
      padding: 12px 14px;
      transition: transform var(--motion), box-shadow var(--motion), filter var(--motion);
      box-shadow: 0 12px 20px rgba(14, 127, 132, 0.3);
    }

    .tool-action:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 14px 24px rgba(14, 127, 132, 0.34);
    }

    .tool-action .material-symbols-outlined {
      font-size: 19px;
    }

    footer {
      margin-top: 26px;
      text-align: center;
      color: var(--text-subtle);
      font-size: 0.88rem;
    }

    footer a {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (min-width: 700px) {
      .tools-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero {
        padding: 32px 30px;
      }
    }

    @media (min-width: 1024px) {
      body {
        padding: 36px;
      }

      .tools-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-badge">
        <span class="material-symbols-outlined">verified</span>
        Premium Link Directory
      </div>
      <h1>Unified AIMZ Tools Link App</h1>
      <p>Open every AIMZ tool from one premium Material-inspired dashboard. Each card includes a short description and direct launch link.</p>
    </section>

    <section id="tool-grid" class="tools-grid" aria-label="Tools list"></section>

    <footer>
      Built by <a href="https://ainulislam.info" target="_blank" rel="noopener noreferrer">Ainul Islam</a>
    </footer>
  </main>

  <script>
    const tools = [
      {
        id: "link_01",
        title: "PDF & Image Tool",
        description: "Convert, optimize, and manage PDF and image files in one fast utility workspace.",
        url: "https://pdfimgtools.vercel.app/",
        icon: "picture_as_pdf"
      },
      {
        id: "link_02",
        title: "Remit BD",
        description: "Handle remittance operations, tracking, and money-transfer workflows for Bangladesh users.",
        url: "https://remitbd.vercel.app/",
        icon: "payments"
      },
      {
        id: "link_03",
        title: "Mess Meal Manager System",
        description: "Manage meal planning, member records, and daily cost distribution for shared living setups.",
        url: "https://smm24.vercel.app/",
        icon: "restaurant"
      },
      {
        id: "link_04",
        title: "Work Tracking Management System",
        description: "Track tasks, monitor team activity, and centralize productivity reporting in one place.",
        url: "https://worktms.vercel.app",
        icon: "monitoring"
      },
      {
        id: "link_05",
        title: "UAE VAT & Tax Suite System",
        description: "Manage VAT workflows, tax calculations, and compliance operations tailored for UAE business needs.",
        url: "https://www.uaevat.live",
        icon: "receipt_long"
      },
      {
        id: "link_06",
        title: "Personal Finance Manager",
        description: "Plan budgets, monitor expenses, and keep your personal financial goals under control.",
        url: "https://finpulse24.vercel.app/",
        icon: "savings"
      },
      {
        id: "link_07",
        title: "Typing & Travel Management ERP",
        description: "Run typing-center and travel-service processes through a combined ERP-style platform.",
        url: "https://ecashbiz.com/landing",
        icon: "flight_takeoff"
      }
    ];

    function renderToolGrid() {
      const grid = document.getElementById("tool-grid");
      if (!grid) return;

      grid.innerHTML = "";

      tools.forEach((tool, index) => {
        const card = document.createElement("article");
        card.className = "tool-card";
        card.style.animationDelay = `${index * 60}ms`;
        card.innerHTML = `
          <div class="tool-head">
            <div class="tool-icon-wrap">
              <span class="material-symbols-outlined">${tool.icon}</span>
            </div>
            <h3 class="tool-title">${tool.title}</h3>
          </div>
          <p class="tool-desc">${tool.description}</p>
          <div class="tool-link-box">${tool.url}</div>
          <a class="tool-action" href="${tool.url}" target="_blank" rel="noopener noreferrer">
            Open Tool
            <span class="material-symbols-outlined">open_in_new</span>
          </a>
        `;
        grid.appendChild(card);
      });
    }

    window.addEventListener("DOMContentLoaded", renderToolGrid);
  </script>
</body>
</html>
